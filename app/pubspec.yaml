name: ukulele
description: 智能音乐学习与弹唱陪练 App（自研版 AI 音乐学园）
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_bloc: ^9.0.0

  # 路由
  go_router: ^16.0.0

  # 音频录制（PCM16 流）
  record: ^6.0.0

  # 端侧音高识别（YIN 算法）
  pitch_detector_dart: ^0.0.7

  # 音频播放（节拍器 / 示范曲）
  just_audio: ^0.10.4

  # 权限处理
  permission_handler: ^12.0.0

  # 网络请求
  dio: ^5.7.0

  # 数据持久化
  shared_preferences: ^2.5.0
  sqflite: ^2.4.0
  path_provider: ^2.1.5

  # 工具
  rxdart: ^0.28.0
  intl: ^0.20.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  very_good_analysis: ^9.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/sheets/